name: Python Fast Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: python-fast-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: check .
      - name: Check formatting
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check .
