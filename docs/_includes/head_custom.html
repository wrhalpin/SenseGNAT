<!-- Favicon kit — browsers pick the best match; ICO is the legacy fallback. -->
<link rel="icon" type="image/png" sizes="32x32"  href="{{ '/assets/images/favicon-32.png'       | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16"  href="{{ '/assets/images/favicon-16.png'       | relative_url }}">
<link rel="icon" type="image/png" sizes="48x48"  href="{{ '/assets/images/favicon-48.png'       | relative_url }}">
<link rel="icon" type="image/x-icon"             href="{{ '/assets/images/favicon.ico'          | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180"     href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

<!-- Open Graph / social cards -->
<meta property="og:type"        content="website">
<meta property="og:site_name"   content="SenseGNAT">
<meta property="og:title"       content="{{ page.title       | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image"       content="{{ '/assets/images/social-card.png' | absolute_url }}">
<meta name="twitter:card"       content="summary_large_image">
<meta name="twitter:image"      content="{{ '/assets/images/social-card.png' | absolute_url }}">
